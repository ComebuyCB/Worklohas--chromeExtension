<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="/static/plugins/jquery-3.6.4/jquery.min.js"></script>
  <link href="/static/plugins/bootstrap-5.3.8/css/bootstrap.min.css" rel="stylesheet">
  <script src="/static/plugins/bootstrap-5.3.8/js/bootstrap.bundle.min.js"></script>
  <link href="/static/plugins/fontawesome-free-7.2.0-web/css/all.min.css" rel="stylesheet">
  <link href="popup.css" rel="stylesheet">
  <script src="popup.js" defer></script>
</head>
<body>
  <header class="wl-header">
    <div class="wl-header-brand">
      <i class="fas fa-layer-group wl-header-icon"></i>
      <span class="wl-header-title">Worklohas 擴充功能</span>
    </div>
    <div class="dropdown">
      <button class="btn wl-btn-gear" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="fas fa-cog"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li>
          <button class="dropdown-item" id="btn-login" type="button">
            <i class="fab fa-google me-2"></i>登入 Google
          </button>
        </li>
        <li>
          <button class="dropdown-item text-danger" id="btn-logout" type="button" style="display:none;">
            <i class="fas fa-sign-out-alt me-2"></i>登出
          </button>
        </li>
      </ul>
    </div>
  </header>
  <div class="iframe-row">
    <div class="iframe-wrap">
      <iframe id="iframe-clipboard" src="/src/popup/clipboard/index.html"></iframe>
    </div>
    <div class="iframe-wrap">
      <iframe id="iframe-toggle" src="/src/popup/toggleInject/index.html"></iframe>
    </div>
  </div>
</body>
</html>
