<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="/static/plugins/jquery-3.6.4/jquery.min.js"></script>
  <link href="/static/plugins/bootstrap-5.3.8/css/bootstrap.min.css" rel="stylesheet">
  <script src="/static/plugins/bootstrap-5.3.8/js/bootstrap.bundle.min.js"></script>
  <link href="/static/plugins/fontawesome-free-7.2.0-web/css/all.min.css" rel="stylesheet">
  <link href="main.css" rel="stylesheet">
  <script src="main.js"></script>
</head>
<body>
<div id="myapp">

  <!-- 主畫面 -->
  <div id="view-main">
    <h5 class="mb-2 fw-bold pb-1">ClipBoard</h5>

    <div id="login-area" style="display:none;">
      <p class="text-muted small mb-0">請點右上角 <i class="fas fa-cog fa-xs"></i> 登入 Google</p>
    </div>

    <div id="logged-area" style="display:none;">
      <div id="loading-area" class="text-center" style="display:none;">
        <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
      </div>

      <div id="content-area" style="display:none;">
        <!-- Tabs -->
        <div class="wl-tab-wrap">
          <div class="nav nav-pills wl-tabs" id="group-tabs"></div>
        </div>

        <!-- 內容 -->
        <div class="wl-tab-content">
          <div class="wl-empty" style="display:none;">尚無項目，點右下角 ＋ 新增</div>
          <ul id="wl-list" class="list-group list-group-flush mb-2"></ul>
          <button class="btn btn-primary wl-btn-circle ms-auto" id="btn-add" title="新增"><i class="fas fa-plus"></i></button>
        </div>
      </div>
    </div>

  </div>

  <!-- 編輯 Modal -->
  <div class="modal fade" id="modal-edit-item" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title" id="edit-mode-label">編輯項目</h6>
          <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-row" value="">
          <input type="hidden" id="edit-order" value="">
          <div class="mb-3">
            <label class="form-label">標題</label>
            <input type="text" class="form-control" id="edit-title" placeholder="例如：TIBCS測試站帳號">
          </div>
          <div class="mb-3">
            <label class="form-label">複製內容</label>
            <textarea class="form-control" id="edit-content" rows="2" placeholder="點擊按鈕後，會複製這段文字。"></textarea>
          </div>
          <div class="mb-0">
            <label class="form-label">群組</label>
            <input type="text" class="form-control" id="edit-group" list="group-list" placeholder="空白為一般，可新增或選擇群組">
            <datalist id="group-list"></datalist>
          </div>
        </div>
        <div class="modal-footer py-2">
          <button class="btn btn-sm btn-outline-danger me-auto" id="btn-delete" style="display:none;"><i class="fas fa-trash me-1"></i>刪除</button>
          <button class="btn btn-primary btn-sm" id="btn-save"><i class="fas fa-save me-1"></i>儲存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 群組管理 Modal -->
  <div class="modal fade" id="modal-edit-group" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title">編輯群組</h6>
          <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body py-3">
          <input type="hidden" id="edit-group-original">
          <div class="mb-2">
            <input type="text" class="form-control form-control-sm" id="edit-group-name" placeholder="群組名稱">
          </div>
          <button type="button" class="btn btn-sm btn-primary w-100" id="btn-rename-group">儲存名稱</button>

          <hr class="my-3">

          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="chk-del-data">
            <label class="form-check-label small" for="chk-del-data">同時刪除群組內所有資料</label>
          </div>
          <button type="button" class="btn btn-sm btn-outline-danger w-100" id="btn-del-group-confirm">刪除群組</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container-fixed">
    <div id="toast" class="toast align-items-center text-white bg-success w-auto border-0" role="alert" aria-live="assertive" aria-atomic="true" style="display:none;">
      <div class="d-flex">
        <div class="toast-body" id="toast-msg">已複製！</div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
