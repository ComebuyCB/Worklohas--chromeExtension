<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="static/jquery-3.5.1/jquery.min.js"></script>
  <link href="static/bootstrap-5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <script src="static/bootstrap-5.3.2/js/bootstrap.bundle.min.js"></script>
  <link href="static/fontawesome-free-5.15.4-web/css/all.min.css" rel="stylesheet">
  <link href="static/popup.css" rel="stylesheet">
  <style>
    .toast-container {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
    }
    .toast {
      width: auto;
      font-size: 0.875rem;
      padding: 0.5rem;
      white-space: nowrap;
    }
    .toast-body {
      padding: 0.25rem;
    }
  </style>
</head>
<body>
  <div id="myapp">
    <div class="p-2">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0" style="color: #333; font-weight: 600;">打卡提醒</h5>
        <button id="addReminder" class="btn btn-primary" style="width: 30px; height: 30px; padding: 0; font-size: 14px; line-height: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center;">+</button>
      </div>
      
      <div id="remindersContainer">
        <!-- 提醒項目將由 JS 動態生成 -->
      </div>
    </div>

    <div class="toast-container">
      <div id="toast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true" style="display: none;">
        <div class="d-flex">
          <div class="toast-body">
            設定已儲存
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="static/popup.js"></script>
</body>
</html>
